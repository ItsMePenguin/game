<!DOCTYPE html>
<html>
<head>
<title>Game</title>
</head>

<body>

<canvas id="gcanvas" style="border:1px solid #000000;"></canvas>  

<script>
var gcanvas=document.getElementById("gcanvas");
gcanvas.height=innerHeight-100
gcanvas.width=innerWidth-10
var ctx= gcanvas.getContext("2d");

var px =gcanvas.width/2;
var py =gcanvas.height/2;

var keypress= []

var speed= 5

gcanvas.height=innerHeight-100
gcanvas.width=innerWidth-10

function update(){
  ctx.clearRect(0,0,gcanvas.width,gcanvas.height);

  ctx.strokeStyle="black";
  ctx.strokeRect(px,py,10,10);
  
  ctx.strokeStyle="red"
  ctx.rect(gcanvas.width/3,gcanvas.height/3,150,150)
  ctx.stroke()
  
  if (keypress.includes("w")){
  py-=speed
  }
  if (keypress.includes("s")){
  py+=speed
  }
  
  if (keypress.includes("d")){
  px+=speed
  }
  
  if (keypress.includes("a")){
  px-=speed
  }
  
 
}

function onkeypress(event){
if (event.key == "w" || event.key == "W"){
keypress.push("w");}

if (event.key== "s" || event.key== "S"){
keypress.push("s");}

if (event.key== "d" || event.key== "D"){
keypress.push("d");}

if (event.key== "a" || event.key== "A"){
keypress.push("a");}
}

document.body.addEventListener("keydown",onkeypress);

function onkeyup(event){
  keypress=keypress.filter(removekeys)
  function removekeys(value,index,array){
    return !(value === event.key.toLowerCase())
  }
}

document.body.addEventListener("keyup",onkeyup)

setInterval(update,20)

</script>
  
</body>

</html>
